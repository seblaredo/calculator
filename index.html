<!DOCTYPE html>
<html lang="en">
<head>
    <script src="script.js" defer></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="content">
    <h1>Calculator!</h1>
    <div class = "calculator">
        <div class="screen"><p></p></div>
        <div class ="keypad">
            <button class= "key num" id ="7">7</button>
            <button class= "key num" id ="8">8</button>
            <button class= "key num" id ="9">9</button>
            <button class= "key op" id ="+">+</button>
            <button class= "key num" id ="4">4</button>
            <button class= "key num" id ="5">5</button>
            <button class= "key num" id ="6">6</button>
            <button class= "key op" id ="-">-</button>
            <button class= "key num" id ="1">1</button>
            <button class= "key num" id ="2">2</button>
            <button class= "key num" id ="3">3</button>
            <button class= "key op" id ="*">x</button>
            <button class= "key num" id ="0">0</button>
            <button class= "key clear" id ="C">AC</button>
            <button class= "key equal" id ="=">=</button>
            <button class= "key op" id ="/">/</button>
        </div>
    </div>
</div>
</body>
</html>
