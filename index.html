<!DOCTYPE html>
<html lang="en">
<head>
    <script src="script.js" defer></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="content">
    <h1>Calculator!</h1>
    <div class = "calculator">
        <div class="screen"><p>Test</p></div>
        <div class ="keypad">
            <div class= "key" id ="7"><button>7</button></div>
            <div class= "key" id ="8"><button>8</button></div>
            <div class= "key" id ="9"><button>9</button></div>
            <div class= "key" id ="+"><button>+</button></div>
            <div class= "key" id ="4"><button>4</button></div>
            <div class= "key" id ="5"><button>5</button></div>
            <div class= "key" id ="6"><button>6</button></div>
            <div class= "key" id ="-"><button>-</button></div>
            <div class= "key" id ="1"><button>1</button></div>
            <div class= "key" id ="2"><button>2</button></div>
            <div class= "key" id ="3"><button>3</button></div>
            <div class= "key" id ="*"><button>x</button></div>
            <div class= "key" id ="0"><button>0</button></div>
            <div class= "key" id ="C"><button>AC</button></div>
            <div class= "key" id ="="><button>=</button></div>
            <div class= "key" id ="/"><button>/</button></div>
        </div>
    </div>
</div>
</body>
</html>
